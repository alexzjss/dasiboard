<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - DaSIboard</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/animations.css">
    <style>
        .auth-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .auth-card {
            width: 100%;
            max-width: 420px;
            background: var(--bg-card);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-lg);
            padding: 40px 32px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            position: relative;
            overflow: hidden;
            animation: scaleIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both;
        }

        .auth-card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg,
                    rgba(124, 58, 237, 0.1) 0%,
                    rgba(192, 132, 252, 0.05) 50%,
                    transparent 100%);
            pointer-events: none;
            z-index: 1;
        }

        .auth-card > * {
            position: relative;
            z-index: 2;
        }

        .auth-header {
            margin-bottom: 32px;
            text-align: center;
        }

        .auth-title {
            font-family: var(--font-display);
            font-size: 32px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--text) 0%, var(--secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
            animation: fadeUp 0.6s cubic-bezier(0.4, 0, 0.2, 1) 0.1s both;
        }

        .auth-subtitle {
            color: var(--text-muted);
            font-size: 14px;
            animation: fadeUp 0.6s cubic-bezier(0.4, 0, 0.2, 1) 0.2s both;
        }

        .form-group {
            margin-bottom: 20px;
            animation: fadeUp 0.6s cubic-bezier(0.4, 0, 0.2, 1) both;
        }

        .form-group:nth-child(3) {
            animation-delay: 0.15s;
        }

        .form-group:nth-child(4) {
            animation-delay: 0.2s;
        }

        .form-group:nth-child(5) {
            animation-delay: 0.25s;
        }

        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: var(--text);
            margin-bottom: 8px;
            font-family: var(--font-body);
        }

        .form-input {
            width: 100%;
            padding: 12px 16px;
            background: var(--bg-3);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-sm);
            color: var(--text);
            font-family: var(--font-body);
            font-size: 14px;
            transition: all var(--transition);
        }

        .form-input::placeholder {
            color: var(--text-dim);
        }

        .form-input:focus {
            outline: none;
            background: rgba(124, 58, 237, 0.1);
            border-color: var(--primary);
            box-shadow: 0 0 12px rgba(124, 58, 237, 0.3);
        }

        .form-input:valid {
            border-color: var(--success);
        }

        .form-input:invalid:not(:placeholder-shown) {
            border-color: var(--danger);
        }

        .password-toggle {
            position: relative;
            display: flex;
            align-items: center;
        }

        .password-toggle-btn {
            position: absolute;
            right: 12px;
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text-muted);
            padding: 4px 8px;
            font-size: 18px;
            transition: color var(--transition);
        }

        .password-toggle-btn:hover {
            color: var(--primary);
        }

        .form-input-password {
            padding-right: 40px;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .checkbox-input {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: var(--primary);
        }

        .checkbox-label {
            font-size: 14px;
            color: var(--text-muted);
            cursor: pointer;
            user-select: none;
        }

        .checkbox-label a {
            color: var(--primary);
            text-decoration: none;
            transition: color var(--transition);
        }

        .checkbox-label a:hover {
            color: var(--highlight);
            text-decoration: underline;
        }

        .btn-primary {
            width: 100%;
            padding: 14px 24px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--highlight) 100%);
            border: none;
            border-radius: var(--radius-sm);
            color: white;
            font-size: 15px;
            font-weight: 600;
            font-family: var(--font-body);
            cursor: pointer;
            transition: all var(--transition);
            margin-top: 24px;
            position: relative;
            overflow: hidden;
        }

        .btn-primary::before {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(255, 255, 255, 0.1);
            opacity: 0;
            transition: opacity var(--transition);
        }

        .btn-primary:hover {
            box-shadow: 0 0 20px rgba(124, 58, 237, 0.5);
            transform: translateY(-2px);
        }

        .btn-primary:hover::before {
            opacity: 1;
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .auth-footer {
            margin-top: 24px;
            text-align: center;
            color: var(--text-muted);
            font-size: 14px;
        }

        .auth-footer a {
            color: var(--primary);
            text-decoration: none;
            transition: color var(--transition);
        }

        .auth-footer a:hover {
            color: var(--highlight);
        }

        .error-message {
            background: rgba(248, 113, 113, 0.1);
            border: 1px solid var(--danger);
            border-radius: var(--radius-sm);
            padding: 12px 16px;
            color: var(--danger);
            font-size: 14px;
            margin-bottom: 20px;
            animation: slideFromRight 0.3s cubic-bezier(0.4, 0, 0.2, 1) both;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .success-message {
            background: rgba(52, 211, 153, 0.1);
            border: 1px solid var(--success);
            border-radius: var(--radius-sm);
            padding: 12px 16px;
            color: var(--success);
            font-size: 14px;
            margin-bottom: 20px;
            animation: slideFromRight 0.3s cubic-bezier(0.4, 0, 0.2, 1) both;
            display: none;
        }

        .success-message.show {
            display: block;
        }

        .loading-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @media (max-width: 480px) {
            .auth-card {
                padding: 32px 24px;
            }

            .auth-title {
                font-size: 28px;
            }
        }
    </style>
</head>

<body>
    <div class="bg-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h1 class="auth-title">DaSIboard</h1>
                <p class="auth-subtitle">Faça login para continuar</p>
            </div>

            <div id="errorMessage" class="error-message"></div>
            <div id="successMessage" class="success-message"></div>

            <form id="loginForm" method="POST" action="/api/login">
                <div class="form-group">
                    <label class="form-label" for="email">Email</label>
                    <input class="form-input" id="email" type="email" name="email" placeholder="seu@email.com"
                        required>
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">Senha</label>
                    <div class="password-toggle">
                        <input class="form-input form-input-password" id="password" type="password" name="password"
                            placeholder="••••••••" required>
                        <button class="password-toggle-btn" type="button" id="togglePassword">
                            <span id="toggleIcon">👁️</span>
                        </button>
                    </div>
                </div>

                <div class="form-group">
                    <div class="checkbox-group">
                        <input class="checkbox-input" id="remember" type="checkbox" name="remember">
                        <label class="checkbox-label" for="remember">Lembrar-me</label>
                    </div>
                </div>

                <button class="btn-primary" type="submit" id="loginBtn">
                    Entrar
                </button>
            </form>

            <div class="auth-footer">
                Não tem uma conta? <a href="/cadastro.html">Cadastre-se</a>
            </div>
        </div>
    </div>

    <script>
        const form = document.getElementById('loginForm');
        const loginBtn = document.getElementById('loginBtn');
        const errorMessage = document.getElementById('errorMessage');
        const successMessage = document.getElementById('successMessage');
        const passwordInput = document.getElementById('password');
        const togglePassword = document.getElementById('togglePassword');
        const toggleIcon = document.getElementById('toggleIcon');

        // Password toggle
        togglePassword.addEventListener('click', (e) => {
            e.preventDefault();
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            toggleIcon.textContent = type === 'password' ? '👁️' : '👁️‍🗨️';
        });

        // Form submission
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorMessage.classList.remove('show');
            successMessage.classList.remove('show');

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            loginBtn.disabled = true;
            loginBtn.innerHTML = '<span class="loading-spinner"></span>Entrando...';

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    successMessage.textContent = 'Login realizado com sucesso! Redirecionando...';
                    successMessage.classList.add('show');
                    localStorage.setItem('token', data.token);
                    setTimeout(() => {
                        window.location.href = '/index.html';
                    }, 1500);
                } else {
                    errorMessage.textContent = data.message || 'Erro ao fazer login';
                    errorMessage.classList.add('show');
                }
            } catch (error) {
                errorMessage.textContent = 'Erro de conexão: ' + error.message;
                errorMessage.classList.add('show');
            } finally {
                loginBtn.disabled = false;
                loginBtn.textContent = 'Entrar';
            }
        });

        // Remember me functionality
        const rememberCheckbox = document.getElementById('remember');
        const emailInput = document.getElementById('email');

        // Load saved email if exists
        if (localStorage.getItem('rememberEmail')) {
            emailInput.value = localStorage.getItem('rememberEmail');
            rememberCheckbox.checked = true;
        }

        // Save email on login
        rememberCheckbox.addEventListener('change', () => {
            if (rememberCheckbox.checked) {
                localStorage.setItem('rememberEmail', emailInput.value);
            } else {
                localStorage.removeItem('rememberEmail');
            }
        });
    </script>
</body>

</html>
